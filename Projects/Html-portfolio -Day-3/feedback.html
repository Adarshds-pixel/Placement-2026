<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>feedback</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Feedback Form</h1>
    <h3>Thank you for visiting my portfolio!</h3>
    </header>
    <form action="Thankyou.html">
        <label for="Name">Name:</label>
        <input type="text" id="Name" placeholder="blablabla" maxlength="20" required>
        <br><br>
        <label for="Email">Email:
        </label>
        <input type="Email" id="Email" placeholder="blablabla@gmail.com" required>
<br><br>
        <label for="Feedback">Feedback:</label>
        <textarea id="Feedback" rows="10" cols="30" required></textarea><br><br>
<input type="Submit"><br><br>
<input type="reset"><br>
    </form>
</body>
</html>
